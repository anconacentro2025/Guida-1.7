<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Guida Affittacamere Ancona Centro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #f5f0e8;
            --sand: #e8dfc8;
            --terracotta: #c4714a;
            --ocean: #2a5f7a;
            --ocean-light: #3a7a9a;
            --ink: #1a1a18;
            --ink-soft: #3a3a35;
            --muted: #8a8478;
            --white: #fefcf8;
            --gold: #c9a96e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        .header { background: var(--ocean); color: var(--white); padding: 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(0,0,0,.25); backdrop-filter: blur(10px); }
        .header-inner { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; }
        .header-title { font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; font-weight: 600; letter-spacing: .02em; line-height: 1.1; }
        .header-subtitle { font-size: .7rem; font-weight: 300; opacity: .75; letter-spacing: .08em; text-transform: uppercase; }
        .lang-toggle { display: flex; background: rgba(255,255,255,.12); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,.2); }
        .lang-btn { padding: 5px 12px; font-size: .72rem; font-weight: 500; cursor: pointer; border: none; background: transparent; color: rgba(255,255,255,.65); transition: all .2s; }
        .lang-btn.active { background: var(--terracotta); color: white; }

        /* Banner foto home */
        .home-banner {
            width: 100%;
            height: 60vh;          /* occupa il 60% dell'altezza dello schermo */
            max-height: 500px;     /* tetto massimo per schermi molto grandi */
			overflow: hidden;
            position: relative;
            background: var(--sand);
        }
        .home-banner-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .home-banner-img.loaded { opacity: 1; }
        .home-banner-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            background: linear-gradient(135deg, var(--sand), var(--cream));
            transition: opacity 0.4s ease;
        }
        .home-banner-placeholder.hidden { opacity: 0; pointer-events: none; }

        .nav-scroll { display: flex; gap: 8px; padding: 14px 20px; overflow-x: auto; background: var(--white); border-bottom: 1px solid var(--sand); -webkit-overflow-scrolling: touch; scrollbar-width: none; white-space: nowrap; }
        .nav-scroll::-webkit-scrollbar { display: none; }
        .nav-pill { flex-shrink: 0; padding: 7px 14px; border-radius: 20px; font-size: .72rem; font-weight: 500; cursor: pointer; border: 1.5px solid var(--sand); background: transparent; color: var(--ink-soft); transition: all .2s; white-space: nowrap; }
        .nav-pill.active, .nav-pill:active { background: var(--ocean); border-color: var(--ocean); color: white; }
        .content { padding: 0 0 100px; }
        .section { display: none; animation: fadeUp .3s ease; }
        .section.active { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .section-header { padding: 24px 20px 16px; border-bottom: 1px solid var(--sand); background: var(--white); }
        .section-header-inner { display: flex; align-items: flex-start; gap: 14px; }
        .section-icon { width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; background: #e8f4fd; }
        .section-title { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 600; line-height: 1.1; margin-bottom: 3px; }
        .cards { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .card { background: var(--white); border-radius: 14px; overflow: hidden; box-shadow: 0 1px 8px rgba(0,0,0,.06); border: 1px solid rgba(0,0,0,.04); }
        .card-header { padding: 14px 16px 10px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--sand); }
        .card-title { font-weight: 500; font-size: .9rem; }
        .card-body { padding: 12px 16px 14px; }
        .contact-card { background: linear-gradient(135deg, var(--ocean) 0%, var(--ocean-light) 100%); border-radius: 14px; padding: 20px; color: white; text-align: center; }
        .contact-number { font-size: 1.5rem; font-weight: 700; margin: 12px 0; }
        .contact-wa, .contact-call { display: inline-block; margin-top: 8px; padding: 8px 16px; border-radius: 25px; text-decoration: none; font-size: .85rem; font-weight: 500; }
        .contact-wa { background: #25D366; color: white; margin-right: 8px; }
        .contact-call { background: rgba(255,255,255,.2); color: white; }

        /* === PLACE CARD con foto === */
        .place-card {
            background: var(--white);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 1px 8px rgba(0,0,0,.06);
            border: 1px solid rgba(0,0,0,.04);
            margin-bottom: 8px;
        }
        .place-photo-wrap {
            width: 100%;
            height: 160px;
            overflow: hidden;
            background: var(--sand);
            position: relative;
        }
        .place-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity .4s ease;
            opacity: 0;
        }
        .place-photo.loaded { opacity: 1; }
        .place-photo-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--sand) 0%, var(--cream) 100%);
            transition: opacity .4s ease;
        }
        .place-photo-placeholder.hidden { opacity: 0; pointer-events: none; }
        .place-body { padding: 12px 14px 14px; display: flex; align-items: flex-start; gap: 10px; }
        .place-emoji-small { font-size: 1.1rem; min-width: 24px; margin-top: 2px; }
        .place-info { flex: 1; }
        .place-name { font-weight: 500; font-size: .9rem; margin-bottom: 2px; }
        .place-desc { font-size: .78rem; color: var(--muted); line-height: 1.4; }
        .place-dist { font-size: .7rem; color: var(--terracotta); font-weight: 500; margin-top: 3px; }
        .place-actions { padding: 0 14px 12px; display: flex; flex-wrap: wrap; gap: 6px; }
        .map-button { display: inline-block; font-size: .7rem; color: var(--ocean); text-decoration: none; background: var(--cream); padding: 4px 10px; border-radius: 16px; border: 1px solid var(--sand); }

        .wifi-box { background: linear-gradient(135deg, #1a3a4a 0%, var(--ocean) 100%); border-radius: 12px; padding: 18px; color: white; text-align: center; margin-bottom: 12px; }
        .wifi-pwd { font-size: 1.1rem; letter-spacing: .12em; background: rgba(255,255,255,.12); padding: 8px 20px; border-radius: 8px; display: inline-block; cursor: pointer; }
        .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--ink); color: white; padding: 10px 20px; border-radius: 20px; font-size: .82rem; opacity: 0; transition: all .3s; z-index: 400; white-space: nowrap; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .info-card { background: var(--white); border-radius: 14px; overflow: hidden; }
        .info-row { display: flex; align-items: center; padding: 14px 16px; gap: 12px; border-bottom: 1px solid var(--sand); text-decoration: none; color: inherit; }
        .info-row:last-child { border-bottom: none; }
        .goto-home { display: flex; justify-content: center; margin-top: 20px; margin-bottom: 10px; }
        .home-btn { background: var(--ocean); color: white; border: none; padding: 10px 20px; border-radius: 30px; font-size: .8rem; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        .home-btn:active { transform: scale(.95); }
        .emergency-card { background: var(--white); border-radius: 14px; overflow: hidden; margin-top: 12px; border: 1px solid var(--sand); }
        .info-label-small { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; min-width: 120px; }
        .info-value-large { font-weight: 500; font-size: .9rem; flex: 1; }
        .login-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(160deg, var(--ocean) 0%, #1a4a62 60%, #0f2f3f 100%); padding: 20px; text-align: center; color: white; }
        .login-box { background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); padding: 30px 20px; border-radius: 20px; max-width: 350px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .login-title { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; font-style: italic; margin-bottom: 0.5rem; }
        .login-subtitle { font-size: 0.8rem; opacity: 0.8; margin-bottom: 2rem; }
        .login-input { width: 100%; padding: 12px 16px; border-radius: 25px; border: none; font-size: 1rem; text-align: center; margin-bottom: 1rem; background: rgba(255,255,255,0.2); color: white; outline: none; }
        .login-input::placeholder { color: rgba(255,255,255,0.6); }
        .login-btn { width: 100%; padding: 12px; border-radius: 25px; border: none; background: var(--terracotta); color: white; font-weight: 600; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
        .login-btn:active { background: #a85d3a; }
        .login-error { color: #ffcccc; font-size: 0.8rem; margin-top: 0.5rem; min-height: 1.2em; }
        .login-remember { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 10px 0; font-size: 0.8rem; }
        .login-remember input { width: auto; margin: 0; }
        .copyright-footer { text-align: center; padding: 15px; font-size: 0.7rem; color: var(--muted); border-top: 1px solid var(--sand); margin-top: 10px; }

        /* Home buttons container (se usato solo in home) */
        .home-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            padding: 16px 10px;
        }
    </style>
</head>
<body>

<!-- SCHERMATA DI LOGIN -->
<div id="loginScreen" class="login-container">
    <div class="login-box">
        <div class="login-title">Affittacamere<br>Ancona Centro</div>
        <div class="login-subtitle">📍 Piazza Roma 3 · Ancona</div>
        <input type="password" id="passwordInput" class="login-input" placeholder="Password" autocomplete="off">
        <div class="login-remember">
            <input type="checkbox" id="rememberCheckbox">
            <label for="rememberCheckbox">Ricordami</label>
        </div>
        <button id="loginButton" class="login-btn">Accedi</button>
        <div id="loginError" class="login-error"></div>
    </div>
</div>

<!-- CONTENUTO PRINCIPALE -->
<div id="mainContent" style="display: none;">
    <header class="header">
        <div class="header-inner">
            <div>
                <div class="header-title">Affittacamere<br>Ancona Centro</div>
                <div class="header-subtitle" id="header-sub">Guest Guide · Piazza Roma 3</div>
            </div>
            <div class="lang-toggle">
                <button class="lang-btn active" onclick="setLang('it')" id="btn-it">IT</button>
                <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
            </div>
        </div>
    </header>

    <!-- Banner foto home (visibile in tutte le pagine) -->
    <div class="home-banner" id="homeBanner">
        <div class="home-banner-placeholder" id="bannerPlaceholder">🏠</div>
        <img class="home-banner-img" 
             id="bannerImg"
             data-src=""
             alt="Ancona Centro"
             onload="this.classList.add('loaded'); document.getElementById('bannerPlaceholder').classList.add('hidden');"
             onerror="this.style.display='none';">
    </div>

    <nav class="nav-scroll" id="nav"></nav>
    <main class="content" id="content"></main>
    <div class="copyright-footer">© 2026 Affittacamere Ancona Centro – Tutti i diritti riservati</div>
    <div class="toast" id="toastEl"></div>
</div>

<script>
    // ==============================================
    // SERVICE WORKER
    // ==============================================
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('./sw.js').catch(function(err) {
                console.warn('SW non registrato:', err);
            });
        });
    }

    // ==============================================
    // PASSWORD
    // ==============================================
    const ACCESS_PASSWORD = "anconacentro2025";
    const loginScreen = document.getElementById('loginScreen');
    const mainContent = document.getElementById('mainContent');
    const passwordInput = document.getElementById('passwordInput');
    const loginButton = document.getElementById('loginButton');
    const loginError = document.getElementById('loginError');
    const rememberCheckbox = document.getElementById('rememberCheckbox');

    async function performLogin(password) {
        if (password === ACCESS_PASSWORD) {
            await renderAll();
            loginScreen.style.display = 'none';
            mainContent.style.display = 'block';
            return true;
        }
        return false;
    }

    async function tryAutoLogin() {
        try {
            const savedPassword = localStorage.getItem('savedGuidePassword');
            if (savedPassword && savedPassword === ACCESS_PASSWORD) {
                await performLogin(savedPassword);
                return true;
            } else if (savedPassword) {
                localStorage.removeItem('savedGuidePassword');
            }
        } catch(e) {}
        return false;
    }

    async function checkPassword() {
        const pwd = passwordInput.value;
        if (await performLogin(pwd)) {
            if (rememberCheckbox.checked) {
                try { localStorage.setItem('savedGuidePassword', ACCESS_PASSWORD); } catch(e) {}
            }
        } else {
            loginError.textContent = 'Password errata. Riprova.';
            passwordInput.value = '';
        }
    }

    loginButton.addEventListener('click', checkPassword);
    passwordInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') checkPassword(); });

    setTimeout(async function() {
        const autoLoggedIn = await tryAutoLogin();
        if (!autoLoggedIn) loginScreen.style.display = 'flex';
    }, 50);

    // ==============================================
    // VARIABILI GLOBALI
    // ==============================================
    let currentLang = 'it';
    let currentSection = -1;
    const HOST_PHONE = '3356750269';
    const HOST_EMAIL = 'anconacentro@yahoo.com';
    const PHOTO_BASE = 'https://raw.githubusercontent.com/anconacentro2025/Guida-1.7/main/img/';
    const HOME_PHOTO = PHOTO_BASE + 'home.jpg';   // Foto banner principale

    let translationCache = new Map();
    try {
        const saved = localStorage.getItem('guideTranslations');
        if (saved) translationCache = new Map(JSON.parse(saved));
    } catch(e) {}

    function saveCache() {
        try { localStorage.setItem('guideTranslations', JSON.stringify([...translationCache])); } catch(e) {}
    }

    async function translateText(text) {
        if (!text || currentLang === 'it') return text;
        if (translationCache.has(text)) return translationCache.get(text);
        try {
            const response = await fetch('https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=it|en');
            const data = await response.json();
            const translated = (data.responseData && data.responseData.translatedText) ? data.responseData.translatedText : text;
            translationCache.set(text, translated);
            saveCache();
            return translated;
        } catch(e) { return text; }
    }

    function getMapLink(place) {
        return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(place + ', Ancona Italia');
    }

    // ==============================================
    // DATI COMPLETI
    // ==============================================

        checkin_time: 'da concordare, massima disponibilità',

            { icon: '🚭', it: 'Vietato fumare in tutto l\'appartamento', en: 'No smoking in the entire apartment' },

        ],
        mustsee: [
            { name: 'Fontana del Calamo (13 Cannelle)', emoji: '⛲', photo: 'fontana-calamo.jpg', desc: 'Antica fontana pubblica del XIII secolo, simbolo di Ancona. Punto di partenza.', dist: '📍 0 m - Sotto le tue finestre, Piazza Roma', mapQuery: 'Fontana delle 13 Cannelle Ancona', order: 1 },
            { name: 'Teatro delle Muse', emoji: '🎭', photo: 'teatro-muse.jpg', desc: 'Teatro storico, edificio neoclassico.', dist: '🚶 600 m - 8 min (Corso Mazzini)', mapQuery: 'Teatro delle Muse Ancona', order: 2 },
            { name: 'Loggia dei Mercanti', emoji: '🏛️', photo: 'loggia-mercanti.jpg', desc: 'Gotico-veneziano del XV secolo.', dist: '🚶 700 m - 10 min', mapQuery: 'Loggia dei Mercanti Ancona', order: 3 },
            { name: 'Santa Maria della Piazza', emoji: '⛪', photo: 'santa-maria-piazza.jpg', desc: 'Romanica dell\'XI secolo, mosaici.', dist: '🚶 750 m - 11 min', mapQuery: 'Santa Maria della Piazza Ancona', order: 4 },
            { name: 'Arco di Traiano', emoji: '🏛️', photo: 'arco-traiano.jpg', desc: 'Arco romano del 114 d.C.', dist: '🚶 1 km - 14 min', mapQuery: 'Arco di Traiano Ancona', order: 6 },
            { name: 'Arco Clementino', emoji: '🚪', photo: 'arco-clementino.jpg', desc: 'Arco monumentale, ingresso al porto storico.', dist: '🚶 1,1 km - 15 min', mapQuery: 'Arco Clementino Ancona', order: 7 },
            { name: 'Fontana dei due Soli (Enzo Cucchi)', emoji: '☀️', photo: 'fontana-due-soli.jpg', desc: 'Fontana contemporanea, alba/tramonto.', dist: '🚶 1,1 km - 15 min', mapQuery: 'Fontana dei due Soli Ancona', order: 8 },
            { name: 'Lanterna Rossa', emoji: '🗼', photo: 'lanterna-rossa.jpg', desc: 'Faro storico del porto (1860).', dist: '🚶 1,5 km - 20 min', mapQuery: 'Lanterna Rossa Ancona', order: 9 },
            { name: 'Resti del Porto Romano', emoji: '🏛️', photo: 'porto-romano.jpg', desc: 'Resti dell\'antico porto romano (II sec. a.C.).', dist: '🚶 1,3 km - 17 min (rientrando)', mapQuery: 'Porto Traianeo Ancona', order: 10 },
            { name: 'Palazzo degli Anziani e Ascensore', emoji: '🏛️', photo: 'palazzo-anziani.jpg', desc: 'Palazzo comunale, ascensore panoramico a Piazza Stracca.', dist: '🚶 950 m - 13 min', mapQuery: 'Palazzo degli Anziani Ancona', order: 11, extraMap: { label: '⬆️ Ascensore per San Ciriaco', query: 'Ascensore San Ciriaco Ancona' } },

            { name: 'Museo Archeologico Nazionale', emoji: '🏺', photo: 'museo-archeologico.jpg', desc: 'Palazzo Ferretti, collezioni greche/etrusche/romane.', dist: '🚶 1,1 km - 15 min', mapQuery: 'Museo Archeologico Nazionale Ancona', order: 13 },
            { name: 'Episcopio / Museo Diocesano', emoji: '🏛️', photo: 'museo-diocesano.jpg', desc: 'Palazzo del Vescovo, Museo Diocesano.', dist: '🚶 1 km - 14 min', mapQuery: 'Museo Diocesano Ancona', order: 14 },

            { name: 'Porta Pia', emoji: '🚪', photo: 'porta-pia.jpg', desc: 'Porta monumentale nelle mura cittadine.', dist: '🚶 0,6 km - 9 min (rientro)', mapQuery: 'Porta Pia Ancona', order: 16 },

            { name: 'Piazza del Plebiscito', emoji: '⛲', photo: 'piazza-plebiscito.jpg', desc: 'Piazza storica, cuore della vita cittadina.', dist: '🚶 0,4 km - 6 min (rientro)', mapQuery: 'Piazza del Plebiscito Ancona', order: 18 },
            { name: 'Parco del Cardeto', emoji: '🏞️', photo: 'parco-cardeto.jpg', desc: 'Deviazione panoramica con anfiteatro romano e fortificazioni.', dist: '🚶 1,8 km - 25 min (dal centro)', mapQuery: 'Parco del Cardeto Ancona', order: 19 },
            { name: 'Fortezza e Parco della Cittadella', emoji: '🏰', photo: 'cittadella.jpg', desc: 'Fortezza cinquecentesca, belvedere sul mare.', dist: '🚶 2,3 km - 33 min', mapQuery: 'Fortezza della Cittadella Ancona', order: 20, extraMap: { label: '🌳 Parco della Cittadella', query: 'Parco della Cittadella Ancona' } },
            { name: 'Mole Vanvitelliana', emoji: '🏛️', photo: 'mole-vanvitelliana.jpg', desc: 'Lazzaretto pentagonale del XVIII secolo, centro culturale. Sede del Museo Tattile Statale Omero.', dist: '🚶 2,5 km - 35 min', mapQuery: 'Mole Vanvitelliana Ancona', order: 21, extraMap: { label: '🖐️ Museo Tattile Omero', query: 'Museo Tattile Statale Omero Ancona' } },

        ],
        restaurants: [
            { name: 'La Cantineta', emoji: '🍷', photo: 'rist-cantineta.jpg', desc: 'Trattoria tipica, tagliolini allo scoglio.', dist: '🚶 280 m - 4 min', mapQuery: 'La Cantineta Ancona' },
            { name: 'Il Pozzo', emoji: '🍲', photo: 'rist-pozzo.jpg', desc: 'Trattoria tradizionale centro storico.', dist: '🚶 350 m - 5 min', mapQuery: 'Il Pozzo Ancona' },

    // Imposta il banner foto
    function setBannerPhoto() {
        const img = document.getElementById('bannerImg');
        const placeholder = document.getElementById('bannerPlaceholder');
        if (!img || !placeholder) return;
        // Reset per evitare cache visive
        img.classList.remove('loaded');
        placeholder.classList.remove('hidden');
        img.style.display = 'block';
        // Imposta la sorgente
        img.setAttribute('data-src', HOME_PHOTO);
        // Forza il caricamento se l'immagine è già in cache (opzionale)
        const observer = new IntersectionObserver(function(entries) {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    img.src = HOME_PHOTO;
                    observer.unobserve(img);
                }
            });
        }, { rootMargin: '200px' });
        observer.observe(img);
        // Fallback per browser senza observer
        if (!('IntersectionObserver' in window)) {
            img.src = HOME_PHOTO;
        }
    }

    async function renderAll() {
        // Aggiorna il banner ogni volta
        setBannerPhoto();

        document.getElementById('header-sub').textContent = 'Guest Guide · Piazza Roma 3';

        const nav = document.getElementById('nav');
        const content = document.getElementById('content');

        if (currentSection === -1) {
            // HOME: nasconde la barra di navigazione, mostra solo i pulsanti delle sezioni
            nav.innerHTML = '';

            const homeButtons = sections.map(function(s, i) {
                return '<button class="nav-pill" onclick="goTo(' + i + ')">' +
                       s.icon + ' ' + tr(s.label_it, s.label_en) + '</button>';
            }).join('');

            content.innerHTML = `
                <section class="section active" style="display:block;">
                    <div class="home-buttons">
                        ${homeButtons}
                    </div>
                </section>
            `;
        } else {
            // SEZIONE: popola la nav e il contenuto
            nav.innerHTML = sections.map(function(s, i) {
                return '<button class="nav-pill ' + (i === currentSection ? 'active' : '') + '" onclick="goTo(' + i + ')">' +
                       s.icon + ' ' + tr(s.label_it, s.label_en) + '</button>';
            }).join('');

            const s = sections[currentSection];
            const sectionContent = await renderSection(s.id);
            content.innerHTML =
                '<section class="section active">' +
                '<div class="section-header"><div class="section-header-inner">' +
                '<div class="section-icon">' + s.icon + '</div>' +
                '<div><div class="section-title">' + tr(s.label_it, s.label_en) + '</div></div>' +
                '</div></div>' +

                '<div class="goto-home"><button class="home-btn" onclick="goTo(-1)">🏠 ' + tr('Home', 'Home') + '</button></div>' +

        // Attiva lazy loading per tutte le immagini delle card
        activateCardLazyImages();
    }

    async function renderPlaces(items) {
        const parts = await Promise.all(items.map(async function(p) {
            const descText = currentLang === 'it' ? p.desc : await translateText(p.desc);
            let photoHtml = '';
            if (p.photo) {
                const src = PHOTO_BASE + p.photo;
                photoHtml =
                    '<div class="place-photo-wrap">' +
                    '<div class="place-photo-placeholder" id="ph-' + p.photo.replace(/\W/g,'') + '">' + p.emoji + '</div>' +
                    '<img class="place-photo" ' +
                    'data-src="' + src + '" ' +
                    'alt="' + p.name + '" ' +
                    'loading="lazy" ' +
                    'onload="this.classList.add(\'loaded\');var pl=document.getElementById(\'ph-' + p.photo.replace(/\W/g,'') + '\');if(pl)pl.classList.add(\'hidden\');" ' +
                    'onerror="this.style.display=\'none\';">' +
                    '</div>';
            }
            let buttons = '<a href="' + getMapLink(p.mapQuery || p.name) + '" target="_blank" class="map-button">🗺️ ' + tr('Apri mappa', 'Open map') + '</a>';
            if (p.extraMap) {
                buttons += '<a href="' + getMapLink(p.extraMap.query) + '" target="_blank" class="map-button">' + p.extraMap.label + '</a>';
            }
            return '<div class="place-card">' +
                photoHtml +
                '<div class="place-body">' +
                '<div class="place-emoji-small">' + p.emoji + '</div>' +
                '<div class="place-info">' +
                '<div class="place-name">' + p.name + '</div>' +
                '<div class="place-desc">' + descText + '</div>' +
                '<div class="place-dist">' + p.dist + '</div>' +
                '</div></div>' +
                '<div class="place-actions">' + buttons + '</div>' +
                '</div>';
        }));
        return parts.join('');
    }

    // Solo per le card (il banner ha un suo observer dedicato)
    function activateCardLazyImages() {
        var imgs = document.querySelectorAll('img.place-photo[data-src]');
        if (!imgs.length) return;
        if ('IntersectionObserver' in window) {
            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        var img = entry.target;
                        img.src = img.getAttribute('data-src');
                        img.removeAttribute('data-src');
                        observer.unobserve(img);
                    }
                });
            }, { rootMargin: '200px' });
            imgs.forEach(function(img) { observer.observe(img); });
        } else {
            imgs.forEach(function(img) {
                img.src = img.getAttribute('data-src');
                img.removeAttribute('data-src');
            });
        }
    }

    function copyWifi() {
        navigator.clipboard.writeText(appData.wifi.password).then(function() {
            showToast(tr('Password copiata!', 'Password copied!'));
        }).catch(function() {
            showToast(appData.wifi.password);
        });
    }

    function showToast(msg) {
        var el = document.getElementById('toastEl');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(function() { el.classList.remove('show'); }, 2500);
    }
