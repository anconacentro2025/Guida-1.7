    document.getElementById('btn-it').classList.toggle('active', lang === 'it');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    renderAll();
  }

  const sections = [
    { id: 'mustsee', icon: '🚶', label_it: 'Tour a piedi', label_en: 'Walking Tour' },
    { id: 'around', icon: '🌊', label_it: 'Dintorni', label_en: 'Around' },
    { id: 'marche', icon: '🏛️', label_it: 'Nelle Marche', label_en: 'Marche' },
    { id: 'restaurants', icon: '🍽️', label_it: 'Ristoranti', label_en: 'Restaurants' },
    { id: 'supermarkets', icon: '🛒', label_it: 'Supermercati', label_en: 'Supermarkets' },
    { id: 'parking', icon: '🅿️', label_it: 'Parcheggi', label_en: 'Parking' },
    { id: 'transport', icon: '🚌', label_it: 'Trasporti', label_en: 'Transport' },
    { id: 'wifi', icon: '📶', label_it: 'Wi-Fi & Regole', label_en: 'Wi-Fi & Rules' },
    { id: 'contact', icon: '📞', label_it: 'Contatti & Emergenze', label_en: 'Contacts & Emergency' }
  ];

  function renderAll() {
    document.getElementById('hero-welcome').textContent = t('Benvenuto', 'Welcome');
    document.getElementById('hero-tagline').textContent = t('"Il cuore antico di Ancona sotto le tue finestre"', '"The ancient heart of Ancona under your windows"');
    document.getElementById('header-sub').textContent = t('Guest Guide · Piazza Roma 3', 'Guest Guide · Piazza Roma 3');
    document.getElementById('hero-title').innerHTML = t('Affittacamere<br>Ancona Centro', 'Guesthouse<br>Ancona Centro');
    
    const nav = document.getElementById('nav');
    nav.innerHTML = sections.map((s, i) => `<button class="nav-pill ${i === currentSection ? 'active' : ''}" onclick="goTo(${i})">${s.icon} ${t(s.label_it, s.label_en)}</button>`).join('');
    
    const content = document.getElementById('content');
    if (currentSection === -1) {
      content.innerHTML = `<section class="section active" style="display:block;">
        <div class="home-welcome">
          <div class="home-welcome-icon">🏠</div>
          <div class="home-welcome-text">${t('Scegli una sezione dal menu sopra', 'Choose a section from the menu above')}</div>
          <div class="home-address">📍 Piazza Roma 3 · Ancona</div>
          <div class="goto-top">
            <button class="top-btn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑ ${t('Torna su', 'Back to top')}</button>
          </div>
        </div>
      </section>`;
    } else {
      content.innerHTML = sections.map((s, i) => `<section class="section ${i === currentSection ? 'active' : ''}" id="sec-${i}">
        <div class="section-header"><div class="section-header-inner"><div class="section-icon">${s.icon}</div><div><div class="section-title">${t(s.label_it, s.label_en)}</div></div></div></div>
        <div class="cards">${renderSection(s.id)}<div class="goto-top"><button class="top-btn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑ ${t('Torna su', 'Back to top')}</button></div></div>
      </section>`).join('');
    }
  }

  function renderSection(id) {
    if (id === 'contact') return renderContactEmergency();
    if (id === 'wifi') return renderWifi();
    if (id === 'mustsee') return renderPlaces(appData.mustsee.sort((a,b) => a.order - b.order), true);
    if (id === 'around') return renderPlaces([
      { name: 'Portonovo (Baia del Conero)', emoji: '🌊', desc_it: 'Baia incantevole, bus 94.', desc_en: 'Enchanting bay, bus 94.', dist: '🚌 10 km - 25 min', mapQuery: 'Portonovo Ancona' },
      { name: 'Sirolo e Numana', emoji: '🏖️', desc_it: 'Perle del Conero.', desc_en: 'Pearls of Conero.', dist: '🚗 15 km - 30 min', mapQuery: 'Sirolo AN' },
      { name: 'Loreto', emoji: '⛪', desc_it: 'Santuario della Santa Casa.', desc_en: 'Holy House Sanctuary.', dist: '🚗 22 km - 25 min', mapQuery: 'Loreto AN' },
      { name: 'Recanati', emoji: '📖', desc_it: 'Città di Leopardi.', desc_en: 'Leopardi\'s town.', dist: '🚗 30 km - 35 min', mapQuery: 'Recanati' }
    ]);
    if (id === 'marche') {
      let cards = renderPlaces([
        { name: 'Grotte di Frasassi', emoji: '🕯️', desc_it: 'Complesso carsico spettacolare.', desc_en: 'Spectacular caves.', dist: '🚗 65 km - 50 min', mapQuery: 'Grotte di Frasassi' },
        { name: 'Urbino', emoji: '🏛️', desc_it: 'Città rinascimentale UNESCO.', desc_en: 'Renaissance UNESCO city.', dist: '🚗 100 km - 1h20', mapQuery: 'Urbino PU' },
        { name: 'Ascoli Piceno', emoji: '⛲', desc_it: 'Piazza del Popolo, una delle più belle d\'Italia.', desc_en: 'One of Italy\'s most beautiful squares.', dist: '🚗 90 km - 1h', mapQuery: 'Ascoli Piceno AP' }
      ]);
      cards += `
        <div class="card useful-links">
          <div class="card-header"><span>🔗</span><span class="card-title">${t('Link utili', 'Useful links')}</span></div>
          <div class="card-body">
            <div class="place-card" style="margin-bottom:8px;">
              <div class="place-emoji">📰</div>
              <div class="place-info">
                <div class="place-name">Edicola di Piazza Roma</div>
                <div class="place-desc">${t('Punto informativo proprio davanti al portone', 'Info point right in front of the door')}</div>
                <a href="${getMapLink('Edicola Piazza Roma Ancona')}" target="_blank" class="map-button">🗺️ ${t('Apri mappa', 'Open map')}</a>
              </div>
            </div>
            <div class="place-card">
              <div class="place-emoji">🌐</div>
              <div class="place-info">
                <div class="place-name">anconatourism.it</div>
                <div class="place-desc">${t('Portale turistico ufficiale di Ancona', 'Official Ancona tourism portal')}</div>
                <a href="https://anconatourism.it" target="_blank" class="map-button">🌐 ${t('Visita sito', 'Visit site')}</a>
              </div>
            </div>
          </div>
        </div>`;
      return cards;
    }
    if (id === 'restaurants') return renderPlaces(appData.restaurants);
    if (id === 'supermarkets') return renderPlaces(appData.supermarkets);
    if (id === 'parking') return renderPlaces(appData.parking);
    if (id === 'transport') return renderTransport();
    return '';
  }

  function renderPlaces(items, isMustSee = false) {
    return items.map(p => {
      let buttons = `<a href="${getMapLink(p.mapQuery || p.name)}" target="_blank" class="map-button">🗺️ ${t('Apri mappa', 'Open map')}</a>`;
      if (p.extraMap) {
        buttons += `<a href="${getMapLink(p.extraMap.query)}" target="_blank" class="map-button">${p.extraMap.label}</a>`;
      }
      return `
        <div class="place-card">
          <div class="place-emoji">${p.emoji}</div>
          <div class="place-info">
            <div class="place-name">${p.name}</div>
            <div class="place-desc">${currentLang === 'it' ? p.desc_it : (p.desc_en || p.desc_it)}</div>
            <div class="place-dist">${p.dist}</div>
            ${buttons}
          </div>
        </div>
      `;
    }).join('');
  }

  function renderTransport() {
    const tr = appData.transport;
    const items = [
      { icon: '🚌', label: t('Bus', 'Bus'), text: t(tr.bus_it, tr.bus_en) },
      { icon: '🚂', label: t('Treno', 'Train'), text: t(tr.train_it, tr.train_en) },
      { icon: '🚕', label: t('Taxi', 'Taxi'), text: t(tr.taxi_it, tr.taxi_en) },
      { icon: '⛴️', label: t('Traghetti', 'Ferries'), text: t(tr.ferry_it, tr.ferry_en) },
      { icon: '✈️', label: t('Aeroporto', 'Airport'), text: t(tr.airport_it, tr.airport_en) }
    ];
    const tourismLink = `<div class="card"><div class="card-header"><span>🌐</span><span class="card-title">${t('Portale turistico ufficiale', 'Official tourism portal')}</span></div><div class="card-body"><a href="https://anconatourism.it" target="_blank" style="display:inline-block; margin-top:8px; padding:8px 16px; background:var(--ocean-light); color:white; border-radius:20px; text-decoration:none;">anconatourism.it</a></div></div>`;
    return items.map(item => `<div class="card"><div class="card-header"><span>${item.icon}</span><span class="card-title">${item.label}</span></div><div class="card-body"><p>${item.text}</p></div></div>`).join('') + tourismLink;
  }

  function renderContactEmergency() {
    const formattedPhone = HOST_PHONE.replace(/(\d{3})(\d{3})(\d{4})/, '$1 $2 $3');
    return `<div class="contact-card">
      <div style="font-size:.8rem;opacity:.8;">📞 ${t('Host raggiungibile anche su WhatsApp', 'Host reachable also on WhatsApp')}</div>
      <div class="contact-number">${formattedPhone}</div>
      <a href="https://wa.me/39${HOST_PHONE}" target="_blank" class="contact-wa">💬 WhatsApp</a>
      <a href="tel:+39${HOST_PHONE}" class="contact-call">📞 ${t('Chiama', 'Call')}</a>
      <div class="contact-email">✉️ <a href="mailto:${HOST_EMAIL}" style="color:white;">${HOST_EMAIL}</a></div>
    </div>
    <div class="card"><div class="card-header"><span>ℹ️</span><span class="card-title">${t('Contatta l\'host', 'Contact the host')}</span></div><div class="card-body"><p>${t('Per qualsiasi necessità, contattami.', 'For any need, contact me.')}</p></div></div>
    <div class="emergency-card">
      <div class="card-header"><span>🚨</span><span class="card-title">${t('Numeri di emergenza', 'Emergency numbers')}</span></div>
      <div class="card-body">
        <div class="info-row"><span class="info-label-small">🚨 112</span><span class="info-value-large">${t('Emergenza generale', 'General emergency')}</span></div>
        <div class="info-row"><span class="info-label-small">🚓 113</span><span class="info-value-large">${t('Polizia', 'Police')}</span></div>
        <div class="info-row"><span class="info-label-small">🚑 118</span><span class="info-value-large">${t('Emergenza sanitaria', 'Medical emergency')}</span></div>
        <div class="info-row"><span class="info-label-small">🏥 Ospedale Riuniti</span><span class="info-value-large">Pronto Soccorso 071 5961</span></div>
        <div class="info-row"><span class="info-label-small">🚕 Taxi</span><span class="info-value-large">Radiotaxi +39 071 43321</span></div>
      </div>
    </div>`;
  }

  function renderWifi() {
    const w = appData.wifi;
    return `<div class="wifi-box"><div>Wi-Fi Network</div><div style="font-size:1.3rem; margin:8px 0;">📶 ${w.ssid}</div><div>${t('Password', 'Password')}</div><div class="wifi-pwd" onclick="copyWifi()">${w.password}</div><div style="font-size:.68rem; opacity:.5;">${t('Tocca per copiare', 'Tap to copy')}</div></div>
    <div class="card"><div class="card-header"><span>📋</span><span class="card-title">${t('Regole della casa', 'House rules')}</span></div><div class="card-body">${appData.rules.map(r => `<div style="display:flex; gap:10px; padding:8px 0;"><span>${r.icon}</span><span>${currentLang === 'it' ? r.text_it : r.text_en}</span></div>`).join('')}</div></div>`;
  }

  function goTo(i) { currentSection = i; renderAll(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
  function copyWifi() { navigator.clipboard.writeText(appData.wifi.password).then(() => showToast(t('Password copiata!', 'Password copied!'))); }
  function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }

  renderAll();
</script>
</body>
</html>
