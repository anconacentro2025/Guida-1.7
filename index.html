<script>
    // ==============================================
    // PASSWORD DI ACCESSO (modifica qui per cambiarla)
    // ==============================================
    const ACCESS_PASSWORD = "anconacentro2025";

    const loginScreen = document.getElementById('loginScreen');
    const mainContent = document.getElementById('mainContent');
    const passwordInput = document.getElementById('passwordInput');
    const loginButton = document.getElementById('loginButton');
    const loginError = document.getElementById('loginError');
    const rememberCheckbox = document.getElementById('rememberCheckbox');

    // Funzione di login asincrona: attende il rendering e poi mostra il contenuto
    async function performLogin(password) {
        if (password === ACCESS_PASSWORD) {
            // Prima rendi la pagina (i pulsanti)
            await renderAll();
            // Solo ora nascondi la schermata di login e mostra il contenuto
            loginScreen.style.display = 'none';
            mainContent.style.display = 'block';
            return true;
        }
        return false;
    }

    // Auto‑login: prova a usare la password salvata
    async function tryAutoLogin() {
        try {
            const savedPassword = localStorage.getItem('savedGuidePassword');
            if (savedPassword && savedPassword === ACCESS_PASSWORD) {
                await performLogin(savedPassword);
                return true;
            } else if (savedPassword) {
                localStorage.removeItem('savedGuidePassword');
            }
        } catch(e) {}
        return false;
    }

    // Login manuale
    async function checkPassword() {
        const pwd = passwordInput.value;
        if (await performLogin(pwd)) {
            if (rememberCheckbox.checked) {
                try {
                    localStorage.setItem('savedGuidePassword', ACCESS_PASSWORD);
                } catch(e) {}
            }
        } else {
            loginError.textContent = 'Password errata. Riprova.';
            passwordInput.value = '';
        }
    }

    loginButton.addEventListener('click', checkPassword);
    passwordInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') checkPassword();
    });

    // Avvio sicuro: piccolo ritardo per garantire che il DOM sia stabile
    setTimeout(async function() {
        const autoLoggedIn = await tryAutoLogin();
        if (!autoLoggedIn) {
            loginScreen.style.display = 'flex';
        }
    }, 50); // 50 millisecondi sono sufficienti

    // ==============================================
    // VARIABILI GLOBALI
    // ==============================================
    let currentLang = 'it';
    let currentSection = -1;
    const HOST_PHONE = '3356750269';
    const HOST_EMAIL = 'anconacentro@yahoo.com';

    let translationCache = new Map();
    try {
        const saved = localStorage.getItem('guideTranslations');
        if (saved) translationCache = new Map(JSON.parse(saved));
    } catch(e) {}

    function saveCache() {
        try {
            localStorage.setItem('guideTranslations', JSON.stringify([...translationCache]));
        } catch(e) {}
    }

    async function translateText(text) {
        if (!text || currentLang === 'it') return text;
        if (translationCache.has(text)) return translationCache.get(text);
        try {
            const response = await fetch('https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=it|en');
            const data = await response.json();
            const translated = (data.responseData && data.responseData.translatedText) ? data.responseData.translatedText : text;
            translationCache.set(text, translated);
            saveCache();
            return translated;
        } catch(e) {
            return text;
        }
    }

        return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(place + ', Ancona Italia');

        supermarkets: [

            { name: 'Mercato delle Erbe', emoji: '🥬', desc: 'Mercato coperto storico.', dist: '🚶 400 m - 5 min', mapQuery: 'Mercato delle Erbe Ancona' },
            { name: 'Coal - Via San Martino', emoji: '🛒', desc: 'Supermercato, aperto anche domenica mattina.', dist: '🚶 450 m - 6 min', mapQuery: 'Coal Via San Martino Ancona' },
            { name: 'Sì con te Supermercato', emoji: '🛒', desc: 'Via Matteotti 115.', dist: '🚶 600 m - 8 min', mapQuery: 'Via Matteotti 115 Ancona' }
        ],
        parking: [
            { name: 'Parcheggio Stamira', emoji: '🅿️', desc: 'Più vicino ma più caro.', dist: '🚶 300 m - 4 min', mapQuery: 'Parcheggio Stamira Ancona' },
            { name: 'Parcheggio Traiano', emoji: '🅿️', desc: 'Il più comodo per il centro.', dist: '🚶 200 m - 3 min', mapQuery: 'Parcheggio Traiano Ancona' },
            { name: 'Parcheggio degli Archi', emoji: '🅿️', desc: 'Consigliato, €6/giorno, oltre 500 posti.', dist: '🚗 1,5 km - 5 min auto', mapQuery: 'Parcheggio degli Archi Ancona' },
            { name: 'Strisce blu', emoji: '🅿️', desc: 'Parcheggio su strada a pagamento, difficile trovare posto.', dist: '📍 In zona centro', mapQuery: 'Parcheggio strisce blu Ancona' }
        ],
        transport: {
            bus: { it: 'Linee 1 e 4 da Piazza Roma (sotto casa). Per Portonovo: bus 94 da Piazza Cavour. Biglietto €1,30 (70 min).', en: 'Lines 1 and 4 from Piazza Roma (right below). For Portonovo: bus 94 from Piazza Cavour. Ticket €1.30 (70 min).' },
            train: { it: 'Stazione Centrale: 1 km - 15 min a piedi. Treni per Roma, Bologna, Pescara.', en: 'Central Station: 1 km - 15 min walk. Trains to Rome, Bologna, Pescara.' },
            taxi: { it: 'Radiotaxi Ancona: +39 071 43321 (24h)', en: 'Radiotaxi Ancona: +39 071 43321 (24h)' },
            ferry: { it: 'Porto Traghetti: 2 km - 10 min taxi. Traghetti per Croazia, Grecia, Albania.', en: 'Ferry Port: 2 km - 10 min by taxi. Ferries to Croatia, Greece, Albania.' },
            airport: { it: 'Aeroporto Falconara: 15 km – 30 min in auto, bus o treno (stazione di Falconara Marittima).', en: 'Falconara Airport: 15 km – 30 min by car, bus or train (Falconara Marittima station).' }
        }
    };

    // ==============================================
    // FUNZIONI DI RENDERING (invariate dalla versione precedente)
    // ==============================================
    function tr(it, en) { return currentLang === 'it' ? it : en; }

    function setLang(lang) {
        currentLang = lang;
        document.getElementById('btn-it').classList.toggle('active', lang === 'it');
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');
        renderAll();
    }

    const sections = [
        { id: 'mustsee',      icon: '🚶',  label_it: 'Tour a piedi',        label_en: 'Walking Tour' },
        { id: 'around',       icon: '🌊',  label_it: 'Dintorni',            label_en: 'Around' },
        { id: 'marche',       icon: '🏛️', label_it: 'Nelle Marche',        label_en: 'Marche' },
        { id: 'restaurants',  icon: '🍽️', label_it: 'Ristoranti',          label_en: 'Restaurants' },
        { id: 'supermarkets', icon: '🛒',  label_it: 'Supermercati',        label_en: 'Supermarkets' },
        { id: 'parking',      icon: '🅿️', label_it: 'Parcheggi',           label_en: 'Parking' },
        { id: 'transport',    icon: '🚌',  label_it: 'Trasporti',           label_en: 'Transport' },
        { id: 'wifi',         icon: '📶',  label_it: 'Wi-Fi & Regole',      label_en: 'Wi-Fi & Rules' },
        { id: 'contact',      icon: '📞',  label_it: 'Contatti & Emergenze',label_en: 'Contacts & Emergency' }
    ];

    async function renderAll() {
        document.getElementById('hero-welcome').textContent = tr('Benvenuto', 'Welcome');
        document.getElementById('hero-tagline').textContent = tr('"Il cuore antico di Ancona sotto le tue finestre"', '"The ancient heart of Ancona under your windows"');
        document.getElementById('header-sub').textContent = 'Guest Guide · Piazza Roma 3';
        document.getElementById('hero-title').innerHTML = tr('Affittacamere<br>Ancona Centro', 'Guesthouse<br>Ancona Centro');

        const nav = document.getElementById('nav');
        nav.innerHTML = sections.map((s, i) =>
            '<button class="nav-pill ' + (i === currentSection ? 'active' : '') + '" onclick="goTo(' + i + ')">' +
            s.icon + ' ' + tr(s.label_it, s.label_en) + '</button>'
        ).join('');

        const content = document.getElementById('content');

        if (currentSection === -1) {
            content.innerHTML =
                '<section class="section active" style="display:block;">' +
                '<div style="text-align:center;padding:60px 20px;">' +
                '<div style="font-size:3rem;margin-bottom:16px;">🏠</div>' +
                '<p style="font-size:1rem;color:var(--ocean);font-family:\'Cormorant Garamond\',serif;font-style:italic;">' +
                tr('Scegli una sezione dal menu sopra', 'Choose a section from the menu above') +
                '</p></div></section>';
            return;
        }

        const s = sections[currentSection];
        const sectionContent = await renderSection(s.id);
        content.innerHTML =
            '<section class="section active">' +
            '<div class="section-header"><div class="section-header-inner">' +
            '<div class="section-icon">' + s.icon + '</div>' +
            '<div><div class="section-title">' + tr(s.label_it, s.label_en) + '</div></div>' +
            '</div></div>' +
            '<div class="cards">' + sectionContent +
            '<div class="goto-home"><button class="home-btn" onclick="goTo(-1)">🏠 ' + tr('Home', 'Home') + '</button></div>' +
            '</div></section>';
    }

    async function renderSection(id) {
        if (id === 'contact')      return renderContactEmergency();
        if (id === 'wifi')         return renderWifi();
        if (id === 'transport')    return renderTransport();
        if (id === 'mustsee')      return await renderPlaces(appData.mustsee.slice().sort(function(a,b){ return a.order - b.order; }));
        if (id === 'restaurants')  return await renderPlaces(appData.restaurants);
        if (id === 'supermarkets') return await renderPlaces(appData.supermarkets);
        if (id === 'parking')      return await renderPlaces(appData.parking);
        if (id === 'around') return await renderPlaces([
            { name: 'Portonovo (Baia del Conero)', emoji: '🌊', desc: 'Baia incantevole, bus 94.', dist: '🚌 10 km - 25 min', mapQuery: 'Portonovo Ancona' },
            { name: 'Sirolo e Numana', emoji: '🏖️', desc: 'Perle del Conero.', dist: '🚗 15 km - 30 min', mapQuery: 'Sirolo AN' },
            { name: 'Loreto', emoji: '⛪', desc: 'Santuario della Santa Casa.', dist: '🚗 22 km - 25 min', mapQuery: 'Loreto AN' },
            { name: 'Recanati', emoji: '📖', desc: 'Città di Leopardi.', dist: '🚗 30 km - 35 min', mapQuery: 'Recanati' }
        ]);
        if (id === 'marche') {
            return await renderPlaces([
                { name: 'Grotte di Frasassi', emoji: '🕯️', desc: 'Complesso carsico spettacolare.', dist: '🚗 65 km - 50 min', mapQuery: 'Grotte di Frasassi' },
                { name: 'Urbino', emoji: '🏛️', desc: 'Città rinascimentale UNESCO.', dist: '🚗 100 km - 1h20', mapQuery: 'Urbino PU' },
                { name: 'Ascoli Piceno', emoji: '⛲', desc: 'Piazza del Popolo, una delle più belle d\'Italia.', dist: '🚗 90 km - 1h', mapQuery: 'Ascoli Piceno AP' }
            ]);
        }
        return '';
    }

    async function renderPlaces(items) {
        const parts = await Promise.all(items.map(async function(p) {
            const descText = currentLang === 'it' ? p.desc : await translateText(p.desc);
            let buttons = '<a href="' + getMapLink(p.mapQuery || p.name) + '" target="_blank" class="map-button">🗺️ ' + tr('Apri mappa', 'Open map') + '</a>';
            if (p.extraMap) {
                buttons += '<a href="' + getMapLink(p.extraMap.query) + '" target="_blank" class="map-button">' + p.extraMap.label + '</a>';
            }
            return '<div class="place-card">' +
                '<div class="place-emoji">' + p.emoji + '</div>' +
                '<div class="place-info">' +
                '<div class="place-name">' + p.name + '</div>' +
                '<div class="place-desc">' + descText + '</div>' +
                '<div class="place-dist">' + p.dist + '</div>' +
                buttons +
                '</div></div>';
        }));
        return parts.join('');
    }

    function renderTransport() {
        const td = appData.transport;
        const items = [
            { icon: '🚌', label: tr('Bus', 'Bus'),           text: tr(td.bus.it, td.bus.en) },
            { icon: '🚂', label: tr('Treno', 'Train'),       text: tr(td.train.it, td.train.en) },
            { icon: '🚕', label: tr('Taxi', 'Taxi'),         text: tr(td.taxi.it, td.taxi.en) },
            { icon: '⛴️', label: tr('Traghetti', 'Ferries'), text: tr(td.ferry.it, td.ferry.en) },
            { icon: '✈️', label: tr('Aeroporto', 'Airport'), text: tr(td.airport.it, td.airport.en) }
        ];
        const cards = items.map(function(item) {
            return '<div class="card"><div class="card-header"><span>' + item.icon + '</span><span class="card-title">' + item.label + '</span></div>' +
                   '<div class="card-body"><p>' + item.text + '</p></div></div>';
        }).join('');
        const tourismLink =
            '<div class="card"><div class="card-header"><span>🌐</span><span class="card-title">' +
            tr('Portale turistico ufficiale', 'Official tourism portal') + '</span></div>' +
            '<div class="card-body"><a href="https://anconatourism.it" target="_blank" style="display:inline-block;margin-top:8px;padding:8px 16px;background:var(--ocean-light);color:white;border-radius:20px;text-decoration:none;">anconatourism.it</a></div></div>';
        return cards + tourismLink;
    }

    function renderContactEmergency() {
        const formattedPhone = HOST_PHONE.replace(/(\d{3})(\d{3})(\d{4})/, '$1 $2 $3');
        let html = '<div class="contact-card">' +
            '<div style="font-size:.8rem;opacity:.8;">📞 ' + tr('Host raggiungibile anche su WhatsApp', 'Host reachable also on WhatsApp') + '</div>' +
            '<div class="contact-number">' + formattedPhone + '</div>' +
            '<a href="https://wa.me/39' + HOST_PHONE + '" target="_blank" class="contact-wa">💬 WhatsApp</a>' +
            '<a href="tel:+39' + HOST_PHONE + '" class="contact-call">📞 ' + tr('Chiama', 'Call') + '</a>' +
            '<div style="margin-top:8px;">✉️ <a href="mailto:' + HOST_EMAIL + '" style="color:white;">' + HOST_EMAIL + '</a></div>' +
            '</div>' +
            '<div class="card"><div class="card-header"><span>ℹ️</span><span class="card-title">' + tr('Contatta l\'host', 'Contact the host') + '</span></div>' +
            '<div class="card-body"><p>' + tr('Per qualsiasi necessità, contattami.', 'For any need, contact me.') + '</p></div></div>' +
            '<div class="emergency-card">' +
            '<div class="card-header"><span>🚨</span><span class="card-title">' + tr('Numeri di emergenza', 'Emergency numbers') + '</span></div>' +
            '<div class="card-body">' +
            '<div class="info-row"><span class="info-label-small">🚨 112</span><span class="info-value-large">' + tr('Emergenza generale', 'General emergency') + '</span></div>' +
            '<div class="info-row"><span class="info-label-small">🚓 113</span><span class="info-value-large">' + tr('Polizia', 'Police') + '</span></div>' +
            '<div class="info-row"><span class="info-label-small">🚑 118</span><span class="info-value-large">' + tr('Emergenza sanitaria', 'Medical emergency') + '</span></div>' +
            '<div class="info-row"><span class="info-label-small">🏥 Ospedale Riuniti</span><span class="info-value-large">Pronto Soccorso 071 5961</span></div>' +
            '<div class="info-row"><span class="info-label-small">🚕 Taxi</span><span class="info-value-large">Radiotaxi +39 071 43321</span></div>' +
            '</div></div>';

        // Link utili (Edicola e anconatourism.it)
        html += '<div class="card" style="margin-top:12px;">' +
            '<div class="card-header"><span>🔗</span><span class="card-title">' + tr('Link utili', 'Useful links') + '</span></div>' +
            '<div class="card-body">' +
            '<div class="place-card" style="margin-bottom:8px;">' +
            '<div class="place-emoji">📰</div>' +
            '<div class="place-info">' +
            '<div class="place-name">Edicola di Piazza Roma</div>' +
            '<div class="place-desc">' + tr('Punto informativo proprio davanti al portone', 'Info point right in front of the door') + '</div>' +
            '<a href="' + getMapLink('Edicola Piazza Roma Ancona') + '" target="_blank" class="map-button">🗺️ ' + tr('Apri mappa', 'Open map') + '</a>' +
            '</div></div>' +
            '<div class="place-card">' +
            '<div class="place-emoji">🌐</div>' +
            '<div class="place-info">' +
            '<div class="place-name">anconatourism.it</div>' +
            '<div class="place-desc">' + tr('Portale turistico ufficiale di Ancona', 'Official Ancona tourism portal') + '</div>' +
            '<a href="https://anconatourism.it" target="_blank" class="map-button">🌐 ' + tr('Visita sito', 'Visit site') + '</a>' +
            '</div></div>' +
            '</div></div>';

        return html;
    }

    function renderWifi() {
        const w = appData.wifi;
        const rulesHtml = appData.rules.map(function(r) {
            return '<div style="display:flex;gap:10px;padding:8px 0;"><span>' + r.icon + '</span><span>' + tr(r.it, r.en) + '</span></div>';
        }).join('');
        return '<div class="wifi-box">' +
            '<div>Wi-Fi Network</div>' +
            '<div style="font-size:1.3rem;margin:8px 0;">📶 ' + w.ssid + '</div>' +
            '<div>' + tr('Password', 'Password') + '</div>' +
            '<div class="wifi-pwd" onclick="copyWifi()">' + w.password + '</div>' +
            '<div style="font-size:.68rem;opacity:.5;">' + tr('Tocca per copiare', 'Tap to copy') + '</div>' +
            '</div>' +
            '<div class="card"><div class="card-header"><span>📋</span><span class="card-title">' + tr('Regole della casa', 'House rules') + '</span></div>' +
            '<div class="card-body">' + rulesHtml + '</div></div>';
    }

    function goTo(i) {
        currentSection = i;
        renderAll();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function copyWifi() {
        navigator.clipboard.writeText(appData.wifi.password).then(function() {
            showToast(tr('Password copiata!', 'Password copied!'));
        }).catch(function() {
            showToast(appData.wifi.password);
        });
    }

    function showToast(msg) {
        var el = document.getElementById('toastEl');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(function() { el.classList.remove('show'); }, 2500);
    }
</script>

</body>
</html>
